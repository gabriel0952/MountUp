name: mountup
description: "MountUp - 台灣山友健行紀錄 APP"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # 狀態管理
  flutter_riverpod: ^3.2.1
  riverpod_annotation: ^4.0.2

  # 導航
  go_router: ^14.8.1

  # Data class
  freezed_annotation: ^3.1.0
  json_annotation: ^4.9.0

  # 錯誤處理
  fpdart: ^1.1.0

  # 本地 DB
  drift: ^2.26.0
  drift_flutter: ^0.2.4
  sqlite3_flutter_libs: ^0.5.29
  path_provider: ^2.1.5
  path: ^1.9.1

  # 地圖（Milestone 2）
  mapbox_maps_flutter: ^2.18.0

  # GPS
  geolocator: ^13.0.4
  flutter_foreground_task: ^8.15.3

  # GPX 解析 / 匯入
  gpx: ^2.2.0
  file_picker: ^8.3.7

  # 照片
  image_picker: ^1.1.2
  flutter_image_compress: ^2.4.0

  # 分享匯出
  share_plus: ^10.1.4
  gal: ^2.3.0

  # 網路圖片快取
  cached_network_image: ^3.4.1

  # 網路請求
  http: ^1.2.2

  # 雲端
  supabase_flutter: ^2.9.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # Code generation
  build_runner: ^2.4.14
  freezed: ^3.2.5
  json_serializable: ^6.9.4
  riverpod_generator: ^4.0.3
  drift_dev: ^2.26.0

flutter:
  uses-material-design: true
